<h2>Skeleton Animation Style</h2>
<p class="subtitle">How should the skeleton bones animate while loading?</p>

<style>
  /* Pulse animation */
  @keyframes pulse-anim {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  /* Shimmer animation */
  @keyframes shimmer-anim {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }

  .bone-pulse {
    background-color: #f0e4c8;
    border-radius: 6px;
    animation: pulse-anim 1.8s ease-in-out infinite;
  }
  .bone-shimmer {
    background: linear-gradient(90deg, #f0e4c8 30%, #fdf3dc 50%, #f0e4c8 70%);
    background-size: 200% 100%;
    border-radius: 6px;
    animation: shimmer-anim 2s linear infinite;
  }

  .skeleton-demo {
    background: #fff;
    border-radius: 12px;
    padding: 20px;
    border: 1px solid #f0e4c8;
    width: 100%;
    box-sizing: border-box;
  }
  .row { display: flex; gap: 12px; margin-bottom: 12px; align-items: center; }
  .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 16px; }
  .stat-card { background: #fffaf0; border-radius: 10px; padding: 14px; border: 1px solid #f0e4c8; }
  .table-row { display: flex; gap: 10px; padding: 8px 0; border-bottom: 1px solid #fdf6e3; }
  .table-row:last-child { border-bottom: none; }
</style>
